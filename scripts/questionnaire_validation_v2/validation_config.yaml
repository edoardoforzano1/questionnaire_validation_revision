# =============================================================================
#  DIEM Questionnaire Validation - Centralized Configuration
#  Edit ONLY this file. Never touch the notebook code.
# =============================================================================

# -- KoBO ----------------------------------------------------------------------
kobo:
  # Working directory used to resolve questionnaire_file / previous_round_file.
  # Keep input files in this folder to avoid long absolute paths.
  working_dir: "C:/Temp"

  # Current questionnaire file to validate (resolved under working_dir).
  questionnaire_file: "DIEM_Monitoring questionnaire_kobo_en_AFG_20260415.xlsx"

  # Legacy fallback (optional): full path. Ignored if questionnaire_file is set.
  questionnaire_path: null

  # Language code: en | fr | ar | es
  language: "en"

  # ISO3 country code - used to fetch admin boundaries from AGOL
  iso3: "AFG"

  # Reference mode:
  #   latest_template -> auto-detect newest matching file in templates_dir
  #   previous_round  -> compare against previous_round_file in working_dir
  reference_mode: "previous_round"

  # Only used when reference_mode = previous_round
  previous_round_file: "DIEM_Monitoring questionnaire_kobo_en_AFG_20260415.xlsx"
  # Legacy fallback path (optional)
  previous_round_path: null

  # Legacy fallback from older notebooks (optional)
  custom_reference_path: null

  # Folder containing all template Excel files
  templates_dir: "c:/Users/edoar/WORK/FAO/repo/questionnaire_validation_revision/Questionnaires/Questionnaire Templates"

  # Where to write the validation report and validated questionnaire
  output_dir: "C:/Temp"

  # Choice list names treated as country-parameter lists (crop/admin/etc).
  country_specific_list_names:
    - "crop"
    - "crop2"
    - "crop3"
    - "admin1"
    - "admin2"
    - "crp_main_sales2"

  # Question names to skip from option-level comparison (temporary operational fields)
  exclude_qnames_from_option_compare:
    - "enumerator"
    - "enum_team"

  # Report metadata
  validation_number: 1
  user_name: "Edoardo"

# -- GeoPoll (future) ----------------------------------------------------------
geopoll:
  questionnaire_path: null
  language: "en"
  iso3: null
  reference_mode: "latest_template"
  custom_reference_path: null
  templates_dir: null
  output_dir: null
  validation_number: 1
  user_name: null
